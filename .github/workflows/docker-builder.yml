name: Build and Push OpenClaw Docker Images

on:
  workflow_dispatch:
    inputs:
      build_sandbox:
        description: 'Build and push sandbox images (default, common, browser)'
        required: true
        default: true
        type: boolean
      build_multi_arch:
        description: 'Build multi-arch (amd64 + arm64) for main image'
        required: false
        default: false
        type: boolean
      image_tag:
        description: 'Custom tag (e.g. v20260310). Empty → use sha + latest'
        required: false
        default: ''
        type: string

env:
  REGISTRY: docker.io
  IMAGE_OWNER: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_BASE: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/openclaw
  SANDBOX_SUFFIX: bookworm-slim

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 主镜像（gateway） - 使用 metadata 生成 tags，直接 push
      - name: Docker meta for main image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=sha,format=long

      - name: Build & push main OpenClaw image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096
            OPENCLAW_INSTALL_DOCKER_CLI=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ inputs.build_multi_arch == 'true' && 'linux/amd64,linux/arm64' || '' }}

      # ───────────── Sandbox images ─────────────
      # 只在 build_sandbox = true 时执行

      - name: Build sandbox (default) locally
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox') != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox
          push: false               # 关键：不要在这里 push 或写远程 tags
          tags: openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag & push sandbox (default)
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox') != ''
        shell: bash
        run: |
          local="openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}"
          remote_base="${{ env.IMAGE_BASE }}-sandbox"

          docker tag $local $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker tag $local $remote_base:latest
          docker push $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker push $remote_base:latest

          if [ -n "${{ inputs.image_tag }}" ]; then
            docker tag $local $remote_base:${{ inputs.image_tag }}
            docker push $remote_base:${{ inputs.image_tag }}
          fi

      # sandbox-common（如果文件存在）
      - name: Build & push sandbox-common
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox-common') != ''
        shell: bash
        run: |
          local="openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }}"
          remote_base="${{ env.IMAGE_BASE }}-sandbox-common"

          docker buildx build --push \
            --tag $local \
            --tag $remote_base:${{ env.SANDBOX_SUFFIX }} \
            --tag $remote_base:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f Dockerfile.sandbox-common .

          if [ -n "${{ inputs.image_tag }}" ]; then
            docker tag $local $remote_base:${{ inputs.image_tag }}
            docker push $remote_base:${{ inputs.image_tag }}
          fi

      # sandbox-browser（类似）
      - name: Build & push sandbox-browser
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox-browser') != ''
        shell: bash
        run: |
          local="openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }}"
          remote_base="${{ env.IMAGE_BASE }}-sandbox-browser"

          docker buildx build --push \
            --tag $local \
            --tag $remote_base:${{ env.SANDBOX_SUFFIX }} \
            --tag $remote_base:latest \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            -f Dockerfile.sandbox-browser .

          if [ -n "${{ inputs.image_tag }}" ]; then
            docker tag $local $remote_base:${{ inputs.image_tag }}
            docker push $remote_base:${{ inputs.image_tag }}
          fi
