name: Build and Push OpenClaw Docker Images

on:
  workflow_dispatch:
    inputs:
      build_sandbox:
        description: 'Build and push sandbox images (default, common, browser)'
        required: true
        default: true
        type: boolean
      build_multi_arch:
        description: 'Build multi-arch (amd64 + arm64) for main image only'
        required: false
        default: false
        type: boolean
      image_tag:
        description: 'Custom tag (e.g. v20260310). Empty → use sha + latest'
        required: false
        default: ''
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REGISTRY: docker.io
      IMAGE_OWNER: ${{ secrets.DOCKER_USERNAME }}
      IMAGE_BASE: docker.io/${{ secrets.DOCKER_USERNAME }}/openclaw
      SANDBOX_SUFFIX: bookworm-slim

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 主镜像 - metadata + build & push
      - name: Docker meta for main image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ inputs.image_tag }},enable=${{ inputs.image_tag != '' }}
            type=sha,format=long

      - name: Build & push main OpenClaw image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096
            OPENCLAW_INSTALL_DOCKER_CLI=1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: ${{ inputs.build_multi_arch == 'true' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

      # ────────────────────────────── Sandbox 部分 ──────────────────────────────
      # 只在 build_sandbox = true 且對應 Dockerfile 存在時執行

      # 1. default sandbox (極簡版)
      - name: Build sandbox-default locally
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox') != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox
          push: false
          tags: openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag & push sandbox-default
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox') != ''
        shell: bash
        run: |
          local_tag="openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}"
          remote_base="${{ env.IMAGE_BASE }}-sandbox"
          docker tag $local_tag $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker tag $local_tag $remote_base:latest
          docker push $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker push $remote_base:latest
          if [ -n "${{ inputs.image_tag }}" ]; then
            docker tag $local_tag $remote_base:${{ inputs.image_tag }}
            docker push $remote_base:${{ inputs.image_tag }}
          fi

      # 2. sandbox-common (推薦，含 git/curl/python 等工具)
      - name: Build sandbox-common locally
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox-common') != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox-common
          push: false
          tags: openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag & push sandbox-common
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox-common') != ''
        shell: bash
        run: |
          local_tag="openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }}"
          remote_base="${{ env.IMAGE_BASE }}-sandbox-common"
          docker tag $local_tag $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker tag $local_tag $remote_base:latest
          docker push $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker push $remote_base:latest
          if [ -n "${{ inputs.image_tag }}" ]; then
            docker tag $local_tag $remote_base:${{ inputs.image_tag }}
            docker push $remote_base:${{ inputs.image_tag }}
          fi

      # 3. sandbox-browser (瀏覽器工具必須)
      - name: Build sandbox-browser locally
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox-browser') != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sandbox-browser
          push: false
          tags: openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Tag & push sandbox-browser
        if: inputs.build_sandbox == 'true' && hashFiles('Dockerfile.sandbox-browser') != ''
        shell: bash
        run: |
          local_tag="openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }}"
          remote_base="${{ env.IMAGE_BASE }}-sandbox-browser"
          docker tag $local_tag $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker tag $local_tag $remote_base:latest
          docker push $remote_base:${{ env.SANDBOX_SUFFIX }}
          docker push $remote_base:latest
          if [ -n "${{ inputs.image_tag }}" ]; then
            docker tag $local_tag $remote_base:${{ inputs.image_tag }}
            docker push $remote_base:${{ inputs.image_tag }}
          fi
