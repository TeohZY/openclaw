name: Build and Push OpenClaw All Docker Images

on:
  workflow_dispatch:
    inputs:
      build_sandbox:
        description: 'Build and push sandbox images (default, common, browser)'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_OWNER: ${{ secrets.DOCKER_USERNAME }}
      SANDBOX_SUFFIX: bookworm-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 主镜像（保持成功部分）
      - name: Build & push main OpenClaw gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_OWNER }}/openclaw:latest
            ${{ env.IMAGE_OWNER }}/openclaw:${{ env.SANDBOX_SUFFIX }}
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096
            OPENCLAW_INSTALL_DOCKER_CLI=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sandbox 构建 - 强制运行 + 详细 debug
      - name: Build & push sandbox images (debug mode)
        run: |
          echo "=== DEBUG: Starting sandbox build section ==="
          echo "Current directory: $(pwd)"
          ls -la scripts/ || echo "scripts/ directory NOT FOUND or empty!"
          ls -la Dockerfile* || echo "No Dockerfile.sandbox* found!"

          # Default sandbox
          echo "=== Building default sandbox ==="
          if [ -f "scripts/sandbox-setup.sh" ]; then
            chmod +x scripts/sandbox-setup.sh
            ./scripts/sandbox-setup.sh || echo "Default sandbox script failed!"
            if docker images | grep -q "openclaw-sandbox.*${{ env.SANDBOX_SUFFIX }}"; then
              docker tag openclaw-sandbox:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}
              docker tag openclaw-sandbox:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox:latest
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox:latest
              echo "Default sandbox pushed successfully!"
            else
              echo "Default sandbox image not found after script!"
            fi
          else
            echo "scripts/sandbox-setup.sh NOT FOUND - skipping default"
          fi

          # Common sandbox
          echo "=== Building common sandbox ==="
          if [ -f "scripts/sandbox-common-setup.sh" ]; then
            chmod +x scripts/sandbox-common-setup.sh
            ./scripts/sandbox-common-setup.sh || echo "Common sandbox script failed!"
            if docker images | grep -q "openclaw-sandbox-common.*${{ env.SANDBOX_SUFFIX }}"; then
              docker tag openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }}
              docker tag openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:latest
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }}
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:latest
              echo "Common sandbox pushed successfully!"
            else
              echo "Common sandbox image not found after script!"
            fi
          else
            echo "scripts/sandbox-common-setup.sh NOT FOUND - skipping common"
          fi

          # Browser sandbox
          echo "=== Building browser sandbox ==="
          if [ -f "scripts/sandbox-browser-setup.sh" ]; then
            chmod +x scripts/sandbox-browser-setup.sh
            ./scripts/sandbox-browser-setup.sh || echo "Browser sandbox script failed!"
            if docker images | grep -q "openclaw-sandbox-browser.*${{ env.SANDBOX_SUFFIX }}"; then
              docker tag openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }}
              docker tag openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:latest
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }}
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:latest
              echo "Browser sandbox pushed successfully!"
            else
              echo "Browser sandbox image not found after script!"
            fi
          else
            echo "scripts/sandbox-browser-setup.sh NOT FOUND - skipping browser"
          fi

          echo "=== DEBUG: Sandbox section finished ==="
