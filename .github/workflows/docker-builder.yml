name: Build and Push OpenClaw All Docker Images - Debug

on:
  workflow_dispatch:  # 无 inputs，直接强制构建所有

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      IMAGE_OWNER: ${{ secrets.DOCKER_USERNAME }}
      SANDBOX_SUFFIX: bookworm-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 主镜像（已成功，无需改）
      - name: Build & push main OpenClaw gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_OWNER }}/openclaw:latest
            ${{ env.IMAGE_OWNER }}/openclaw:${{ env.SANDBOX_SUFFIX }}
          build-args: |
            NODE_OPTIONS=--max-old-space-size=4096
            OPENCLAW_INSTALL_DOCKER_CLI=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Sandbox 强制 debug 步骤（无 if，直接跑）
      - name: Debug and Build Sandbox Images
        run: |
          echo "=== DEBUG START: pwd = $(pwd) ==="
          ls -la . || echo "Current dir empty?"
          ls -la scripts/ || echo "scripts/ NOT FOUND !!! This is likely the issue."
          ls -la Dockerfile* || echo "No Dockerfile found."

          echo "Listing available scripts:"
          find scripts -type f -name "*.sh" || echo "No sh files in scripts/"

          # Default sandbox
          echo "=== Attempting default sandbox ==="
          if [ -f "scripts/sandbox-setup.sh" ]; then
            echo "Found sandbox-setup.sh, executing..."
            chmod +x scripts/sandbox-setup.sh
            ./scripts/sandbox-setup.sh 2>&1 | tee default-build.log || echo "Default script failed!"
            cat default-build.log || true
            if docker images | grep -q "openclaw-sandbox.*${{ env.SANDBOX_SUFFIX }}"; then
              docker tag openclaw-sandbox:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}
              docker tag openclaw-sandbox:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox:latest
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox:${{ env.SANDBOX_SUFFIX }}
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox:latest
              echo "Default sandbox SUCCESS!"
            else
              echo "Default sandbox image MISSING after script!"
            fi
          else
            echo "CRITICAL: scripts/sandbox-setup.sh NOT FOUND in repo!"
          fi

          # Common sandbox
          echo "=== Attempting common sandbox ==="
          if [ -f "scripts/sandbox-common-setup.sh" ]; then
            echo "Found sandbox-common-setup.sh, executing..."
            chmod +x scripts/sandbox-common-setup.sh
            ./scripts/sandbox-common-setup.sh 2>&1 | tee common-build.log || echo "Common script failed!"
            cat common-build.log || true
            if docker images | grep -q "openclaw-sandbox-common.*${{ env.SANDBOX_SUFFIX }}"; then
              docker tag openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }}
              docker tag openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:latest
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:${{ env.SANDBOX_SUFFIX }}
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-common:latest
              echo "Common sandbox SUCCESS!"
            else
              echo "Common sandbox image MISSING after script!"
            fi
          else
            echo "CRITICAL: scripts/sandbox-common-setup.sh NOT FOUND in repo!"
          fi

          # Browser sandbox
          echo "=== Attempting browser sandbox ==="
          if [ -f "scripts/sandbox-browser-setup.sh" ]; then
            echo "Found sandbox-browser-setup.sh, executing..."
            chmod +x scripts/sandbox-browser-setup.sh
            ./scripts/sandbox-browser-setup.sh 2>&1 | tee browser-build.log || echo "Browser script failed!"
            cat browser-build.log || true
            if docker images | grep -q "openclaw-sandbox-browser.*${{ env.SANDBOX_SUFFIX }}"; then
              docker tag openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }}
              docker tag openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }} ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:latest
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:${{ env.SANDBOX_SUFFIX }}
              docker push ${{ env.IMAGE_OWNER }}/openclaw-sandbox-browser:latest
              echo "Browser sandbox SUCCESS!"
            else
              echo "Browser sandbox image MISSING after script!"
            fi
          else
            echo "CRITICAL: scripts/sandbox-browser-setup.sh NOT FOUND in repo!"
          fi

          echo "=== DEBUG END: Sandbox attempt finished ==="
